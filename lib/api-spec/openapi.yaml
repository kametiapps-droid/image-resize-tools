openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: ImageToolz API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: tools
    description: Image tool operations
  - name: stats
    description: Usage statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /tools:
    get:
      operationId: listTools
      tags: [tools]
      summary: List all image tools
      description: Returns all available image processing tools with metadata
      responses:
        "200":
          description: List of tools
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tool"

  /tools/{id}:
    get:
      operationId: getTool
      tags: [tools]
      summary: Get a single tool
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Tool details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tool"
        "404":
          description: Not found

  /tools/{id}/use:
    post:
      operationId: recordToolUse
      tags: [tools]
      summary: Record a tool usage event
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ToolUseInput"
      responses:
        "200":
          description: Usage recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolUseStat"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get overall usage statistics
      responses:
        "200":
          description: Usage statistics summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

  /stats/recent:
    get:
      operationId: getRecentActivity
      tags: [stats]
      summary: Get recent tool usage activity
      responses:
        "200":
          description: Recent activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecentActivity"

  /stats/popular:
    get:
      operationId: getPopularTools
      tags: [stats]
      summary: Get most used tools
      responses:
        "200":
          description: Popular tools sorted by usage
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ToolPopularity"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Tool:
      type: object
      required: [id, name, slug, description, category, usageCount]
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        category:
          type: string
        icon:
          type: ["string", "null"]
        usageCount:
          type: integer
        featured:
          type: boolean

    ToolUseInput:
      type: object
      properties:
        fileType:
          type: ["string", "null"]
        fileSizeKb:
          type: ["integer", "null"]

    ToolUseStat:
      type: object
      required: [toolId, totalUses]
      properties:
        toolId:
          type: string
        totalUses:
          type: integer

    StatsSummary:
      type: object
      required: [totalProcessed, totalTools, uniqueUsersToday]
      properties:
        totalProcessed:
          type: integer
        totalTools:
          type: integer
        uniqueUsersToday:
          type: integer
        topCategoryName:
          type: ["string", "null"]

    RecentActivity:
      type: object
      required: [toolId, toolName, timestamp]
      properties:
        toolId:
          type: string
        toolName:
          type: string
        timestamp:
          type: string
        fileType:
          type: ["string", "null"]

    ToolPopularity:
      type: object
      required: [toolId, toolName, usageCount, percentage]
      properties:
        toolId:
          type: string
        toolName:
          type: string
        usageCount:
          type: integer
        percentage:
          type: number
